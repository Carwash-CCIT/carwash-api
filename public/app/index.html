<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Car Wash — เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff;
            --bg-slate: #030712;
            --bg-card: #0f172a;
            --text-main: #f8fafc;
            --text-secondary: #64748b;
            --card-border: rgba(255, 255, 255, 0.05);
            --font: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-slate);
            color: var(--text-main);
            font-family: var(--font);
            min-height: 100vh;
            padding: 1rem;
        }

        .background-orb {
            position: fixed;
            border-radius: 50%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(148, 163, 184, 0.1) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 2.25rem;
            position: relative;
            z-index: 1;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        input[type="text"], input[type="number"], input[type="password"], input[type="tel"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            color: var(--text-main);
            font-family: var(--font);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            width: 100%;
            background: #ffffff;
            color: #030712;
            border: none;
            border-radius: 16px;
            padding: 1rem;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }
        .btn-primary:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            border-radius: 12px;
            padding: 0.6rem 1rem;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, #f1f5f9, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            font-size: 0.88rem;
            z-index: 9999;
            transition: all 0.3s ease;
        }
        .toast.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }
        .toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .mobile-container {
            max-width: 440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 90vh;
            justify-content: center;
        }
        .glass-panel { margin: 0.5rem auto; max-width: 420px; width: 100%; }

        .auth-view { text-align: center; }
        .auth-icon { font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem; }
        .bay-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #ffffff;
            margin-bottom: 1.5rem;
        }

        .hidden { display: none !important; }

        .info-view { text-align: center; padding: 2rem 1rem; }
        .balance-card {
            background: linear-gradient(135deg, #0f172a, #030712);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.25rem 1.5rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        .balance-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .balance-amount {
            font-size: 3.8rem;
            font-weight: 800;
            color: white;
            line-height: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .balance-currency {
            font-size: 1.6rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-right: 0.2rem;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            text-align: left;
        }
        .info-card h3 {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            font-weight: 500;
            text-transform: uppercase;
        }
        .info-card p {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .instruction-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-top: 0.5rem;
        }
        .instruction-text i { color: #fbbf24; margin-right: 4px; }

        .tab-bar {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            padding: 0.45rem 1.25rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary-color);
            border-color: transparent;
            color: #030712;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .result-text { font-size: 0.9rem; color: #6b7280; }
        .input-group-vertical { display: flex; flex-direction: column; gap: 0.75rem; }

        .btn-google {
            width: 100%;
            background: #ffffff;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 16px;
            padding: 0.85rem 1rem;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .btn-google:hover {
            background: #f8f9fa;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transform: translateY(-1px);
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>

    <div class="mobile-container">
        <!-- AUTH VIEW -->
        <section id="viewAuth" class="glass-panel auth-view">
            <div class="auth-icon"><i class="fa-solid fa-car-tunnel"></i></div>
            <h2 class="gradient-text" style="font-size:1.8rem; margin-bottom:0.4rem;">Smart Car Wash</h2>
            <div class="bay-badge" id="bayBadge">
                <i class="fa-solid fa-hashtag"></i><span id="bayBadgeText">กำลังโหลด...</span>
            </div>

            <p style="color:var(--text-secondary); margin-bottom:1.5rem; font-size:0.95rem;">เข้าสู่ระบบด้วยบัญชี Google ของคุณเพื่อเริ่มต้นใช้งาน</p>

            <div id="btnGoogleSignIn" style="display: flex; justify-content: center; margin-bottom: 1rem;"></div>

            <p class="result-text" id="authMessage" style="margin-top:1rem; text-align:center;"></p>
        </section>

        <!-- INFO VIEW -->
        <section id="viewInfo" class="hidden">
            <div class="info-view">
                <div style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:0.5rem;">สวัสดีคุณ</div>
                <h2 id="infoName" style="font-size:1.8rem; margin-bottom:1.5rem;" class="gradient-text">—</h2>

                <div class="balance-card">
                    <div class="balance-label">ยอดเงินคงเหลือ</div>
                    <div class="balance-amount">
                        <div><span class="balance-currency">฿</span><span id="infoBalance">0</span></div>
                        <button class="btn-primary" style="padding: 0.4rem 1rem; width: auto; font-size: 0.9rem; border-radius: 25px;" onclick="goToWash()">
                            <i class="fa-solid fa-play"></i> เริ่มใช้งาน
                        </button>
                    </div>
                </div>

                <div class="info-card">
                    <h3><i class="fa-solid fa-location-dot"></i> ช่องบริการของคุณ</h3>
                    <p>Bay <span id="infoBay">—</span></p>
                </div>

                <div class="info-card">
                    <h3><i class="fa-solid fa-circle-info"></i> วิธีใช้งาน</h3>
                    <p class="instruction-text">
                        <i class="fa-solid fa-hand-point-right"></i>เลือกบริการจากหน้าถัดไป<br>
                        <i class="fa-solid fa-droplet"></i>น้ำ &nbsp;|&nbsp; <i class="fa-solid fa-soap"></i>โฟม &nbsp;|&nbsp; <i class="fa-solid fa-wind"></i>ลม &nbsp;|&nbsp; <i class="fa-solid fa-star"></i>เคลือบเงา &nbsp;|&nbsp; <i class="fa-solid fa-circle-dot"></i>ยางดำ
                    </p>
                </div>

                <button class="btn-primary" style="background:transparent; border: 1px solid rgba(255,255,255,0.2); width:100%; margin-top:0.5rem;" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
                </button>
            </div>
        </section>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="app.js?v=3"></script>
</body>
</html>
