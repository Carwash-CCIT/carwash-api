<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Car Wash — เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff;
            --bg-slate: #030712;
            --bg-card: #0f172a;
            --text-main: #f8fafc;
            --text-secondary: #64748b;
            --card-border: rgba(255, 255, 255, 0.05);
            --font: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-slate);
            color: var(--text-main);
            font-family: var(--font);
            min-height: 100vh;
            padding: 1rem;
        }

        .background-orb {
            position: fixed;
            border-radius: 50%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(148, 163, 184, 0.1) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 2.25rem;
            position: relative;
            z-index: 1;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            font-size: 0.88rem;
            z-index: 9999;
            transition: all 0.3s ease;
        }
        .toast.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }
        .toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .mobile-container {
            max-width: 440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 90vh;
            justify-content: center;
        }
        .glass-panel { margin: 0.5rem auto; max-width: 420px; width: 100%; }

        .auth-view { text-align: center; }
        .auth-icon { font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem; }
        .bay-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #ffffff;
            margin-bottom: 1.5rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #f1f5f9, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #btnGoogleSignIn {
            margin-top: 1rem;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>

    <div class="mobile-container">
        <section id="viewAuth" class="glass-panel auth-view">
            <div class="auth-icon"><i class="fa-solid fa-car-tunnel"></i></div>
            <h2 class="gradient-text" style="font-size:1.8rem; margin-bottom:0.4rem;">Smart Car Wash</h2>
            <div class="bay-badge">
                <i class="fa-solid fa-hashtag"></i><span>Bay 1</span>
            </div>

            <p style="color:var(--text-secondary); margin-bottom:1.5rem; font-size:0.95rem;">เข้าสู่ระบบด้วยบัญชี Google ของคุณ</p>

            <div id="btnGoogleSignIn"></div>
        </section>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="app.js?v=4"></script>
</body>
</html>
